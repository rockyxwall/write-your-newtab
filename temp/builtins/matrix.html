<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix - WYNTab</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #0F0;
        }
        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 255, 0, 0.1) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
        }
        .clock-container {
            position: relative;
            z-index: 10;
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 3rem 4rem;
            border: 1px solid #0F0;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);
            border-radius: 8px;
            backdrop-filter: blur(5px);
        }
        #clock {
            font-size: 7rem;
            font-weight: 900;
            text-shadow: 0 0 15px #0F0;
            margin: 0;
            letter-spacing: -2px;
        }
        #date {
            font-size: 1.2rem;
            letter-spacing: 6px;
            margin-top: 15px;
            opacity: 0.8;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <div class="clock-container">
        <h1 id="clock">00:00:00</h1>
        <div id="date">SYSTEM READY</div>
    </div>
</body>
</html>
