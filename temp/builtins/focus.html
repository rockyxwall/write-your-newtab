<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Focus</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh; display: flex; align-items: center; justify-content: center;
      background: #0d0d0d; font-family: Georgia, serif; color: #e8e8e0;
    }
    .wrap { text-align: center; padding: 2rem; animation: up .8s cubic-bezier(.22,1,.36,1); }
    .label { font-size: clamp(.7rem,1.5vw,.85rem); letter-spacing:.4em; text-transform:uppercase; opacity:.35; margin-bottom:2rem; }
    #focus {
      background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,.2);
      color: #fff; font-size: clamp(1.5rem,4vw,2.5rem); font-family: inherit;
      text-align: center; width: clamp(280px,60vw,680px); padding: .5rem 0; outline: none;
      transition: border-color .3s;
    }
    #focus:focus { border-bottom-color: rgba(255,255,255,.55); }
    #focus::placeholder { color: rgba(255,255,255,.18); }
    .hint { margin-top:1.5rem; font-size:.7rem; letter-spacing:.2em; opacity:.2; text-transform:uppercase; }
    @keyframes up { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="label">What is your main focus today?</p>
    <input id="focus" type="text" placeholder="type it here…" autofocus>
    <p class="hint">Enter to save</p>
  </div>
  <script>
    const el = document.getElementById('focus')
    el.value = localStorage.getItem('wyn-focus') ?? ''
    el.addEventListener('input', () => localStorage.setItem('wyn-focus', el.value))
    el.addEventListener('keydown', e => { if (e.key === 'Enter') el.blur() })
  </script>
</body>
</html>
