<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Terminal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh; background: #0a0e0a; font-family: 'Courier New', monospace;
      color: #00ff41; padding: 2.5rem; background-image:
        repeating-linear-gradient(transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);
    }
    .win { max-width: 760px; margin: 0 auto; animation: boot .5s ease; }
    .bar { background:#00ff41; color:#0a0e0a; font-weight:700; padding:.3rem 1rem; font-size:.8rem; letter-spacing:.1em; margin-bottom:1.5rem; }
    .line { margin-bottom:.45rem; font-size:clamp(.72rem,1.4vw,.9rem); line-height:1.65; }
    .p { color:#00cc33; opacity:.65; }
    .links { margin-top:1.8rem; }
    .links a { color:#00ff41; text-decoration:none; border-bottom:1px solid rgba(0,255,65,.3); margin-right:1.2rem; font-size:.88rem; transition:all .15s; }
    .links a:hover { color:#fff; border-bottom-color:#fff; }
    .cursor { display:inline-block; width:.55em; height:1em; background:#00ff41; vertical-align:text-bottom; animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes boot { from{opacity:0} to{opacity:1} }
  </style>
</head>
<body>
  <div class="win">
    <div class="bar">WRITE YOUR NEWTAB — TERMINAL</div>
    <div class="line"><span class="p">&gt; </span>session.start — OK</div>
    <!-- <div class="line"><span class="p">&gt; </span>time — <strong id="ts"></strong></div> -->
    <!-- <div class="line" style="opacity:.3"><span class="p">&gt; </span>────────────────────────────</div> -->
    <div class="links line">
      <span class="p">&gt; </span>links —
      <a href="https://github.com" target="_blank">github</a>
      <a href="https://news.ycombinator.com" target="_blank">hackernews</a>
      <a href="https://developer.mozilla.org" target="_blank">mdn</a>
      <a href="https://reddit.com" target="_blank">reddit</a>
    </div>
    <div class="line" style="margin-top:1.5rem"><span class="p">&gt; </span><span class="cursor"></span></div>
  </div>
  <!-- <script>
    const el = document.getElementById('ts')
    const tick = () => el.textContent = new Date().toLocaleString()
    tick(); setInterval(tick, 1000)
  </script> -->
</body>
</html>
