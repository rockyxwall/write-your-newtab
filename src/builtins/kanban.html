<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Lite - WYNTab</title>
    <style>
        :root {
            --bg: #0b0f19;
            --column: #161d2f;
            --card: #212b45;
            --text: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
        }
        body {
            margin: 0;
            padding: 3rem;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }
        header {
            margin-bottom: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .board {
            display: flex;
            gap: 2rem;
            flex: 1;
            overflow-x: auto;
            padding-bottom: 1rem;
        }
        .column {
            background: var(--column);
            width: 340px;
            min-width: 340px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .column h2 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 0 1.5rem 0;
            color: var(--text-dim);
            font-weight: 800;
        }
        .task-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .task {
            background: var(--card);
            padding: 1.25rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            font-size: 1rem;
            line-height: 1.5;
            color: var(--text-dim);
        }
        .add-task {
            margin-top: 1.5rem;
            background: transparent;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            padding: 1rem;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1 style="margin: 0; font-size: 1.75rem; font-weight: 900; letter-spacing: -1px;">Task Board</h1>
        <div style="font-size: 0.9rem; color: var(--text-dim); font-weight: 600;">Standard Layout</div>
    </header>
    <div class="board">
        <div class="column">
            <h2>To Do</h2>
            <div class="task-list">
                <div class="task">Design new dashboard</div>
                <div class="task">Fix clock issues</div>
            </div>
            <div class="add-task">STATIC VIEW</div>
        </div>
        <div class="column">
            <h2>In Progress</h2>
            <div class="task-list">
                <div class="task">Implementing themes</div>
            </div>
            <div class="add-task">STATIC VIEW</div>
        </div>
        <div class="column">
            <h2>Done</h2>
            <div class="task-list">
                <div class="task">Initial release</div>
            </div>
            <div class="add-task">STATIC VIEW</div>
        </div>
    </div>
</body>
</html>
