<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links - WYNTab</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #141414;
            --border: #262626;
            --text: #ffffff;
            --text-dim: #737373;
            --accent: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            width: 90%;
            max-width: 900px;
        }
        .link {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem 1.5rem;
            text-decoration: none;
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.2, 1, 0.3, 1);
            text-align: center;
        }
        .link:hover {
            transform: translateY(-8px);
            background: #1a1a1a;
            border-color: #404040;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .link .icon {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .link .name {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
        }
        .link .url {
            font-size: 0.7rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
            font-weight: 500;
        }
        @media (max-width: 640px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="grid">
        <a href="https://github.com" target="_blank" class="link">
            <div class="icon">💻</div>
            <div class="name">GitHub</div>
            <div class="url">github.com</div>
        </a>
        <a href="https://youtube.com" target="_blank" class="link">
            <div class="icon">📺</div>
            <div class="name">YouTube</div>
            <div class="url">youtube.com</div>
        </a>
        <a href="https://gmail.com" target="_blank" class="link">
            <div class="icon">✉️</div>
            <div class="name">Gmail</div>
            <div class="url">mail.google.com</div>
        </a>
        <a href="https://reddit.com" target="_blank" class="link">
            <div class="icon">💬</div>
            <div class="name">Reddit</div>
            <div class="url">reddit.com</div>
        </a>
        <a href="https://twitter.com" target="_blank" class="link">
            <div class="icon">🐦</div>
            <div class="name">Twitter</div>
            <div class="url">twitter.com</div>
        </a>
        <a href="https://news.ycombinator.com" target="_blank" class="link">
            <div class="icon">🍊</div>
            <div class="name">Hacker News</div>
            <div class="url">ycombinator.com</div>
        </a>
    </div>
</body>
</html>
